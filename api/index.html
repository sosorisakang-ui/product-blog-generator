<script>
let selectedStyles = ['솔직한 후기'];
let history = [];
let isEditing = false;

function toggleChip(el, style) {
  const idx = selectedStyles.indexOf(style);
  if (idx > -1) {
    if (selectedStyles.length === 1) return;
    selectedStyles.splice(idx, 1);
    el.classList.remove('on');
  } else {
    selectedStyles.push(style);
    el.classList.add('on');
  }
}

document.getElementById('extraInput').addEventListener('input', function() {
  document.getElementById('extraCount').textContent = this.value.length + ' / 300';
});

async function generate() {
  const keyword = document.getElementById('keywordInput').value.trim();
  if (!keyword) { showToast('⚠️ 상품 키워드를 입력해 주세요'); return; }

  setLoading(true);

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        keyword,
        styles: selectedStyles.join(', '),
        length: document.getElementById('lengthSel').value,
        target: document.getElementById('targetSel').value,
        tone: document.getElementById('toneSel').value,
        extra: document.getElementById('extraInput').value.trim()
      })
    });

    const data = await res.json();
    if (!res.ok) { showToast('⚠️ ' + (data.error || '오류가 났어요')); return; }

    const text = data.result || '';
    const titleMatch = text.match(/제목:\s*(.+)/);
    const tagMatch = text.match(/태그:\s*(.+)/s);

    let title = titleMatch ? titleMatch[1].trim() : keyword + ' 후기';
    let tags = tagMatch ? tagMatch[1].trim() : '';
    let body = text;
    if (titleMatch) body = body.replace(/제목:\s*.+\n?/, '').trim();
    if (tagMatch) body = body.replace(/태그:\s*.+$/s, '').trim();

    document.getElementById('resultTitle').textContent = title;
    document.getElementById('resultBody').textContent = body;
    document.getElementById('resultEdit').value = body;

    const tagWrap = document.getElementById('resultTags');
    tagWrap.innerHTML = '';
    if (tags) {
      tags.split(/\s+/).filter(t => t.startsWith('#')).forEach(t => {
        const span = document.createElement('span');
        span.className = 'result-tag';
        span.textContent = t;
        tagWrap.appendChild(span);
      });
    }

    document.getElementById('resultCard').classList.add('show');
    document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth', block: 'start' });

    history.unshift({ keyword, title, body, time: new Date() });
    if (history.length > 5) history.pop();
    renderHistory();
    showToast('✨ 글 생성 완료!');
    if (isEditing) toggleEdit();

  } catch(err) {
    showToast('⚠️ 오류가 났어요. 잠시 후 다시 시도해 주세요.');
  } finally {
    setLoading(false);
  }
}

function setLoading(on) {
  document.getElementById('loadingBar').classList.toggle('show', on);
  document.getElementById('loadingMsg').classList.toggle('show', on);
  document.getElementById('mainGenBtn').disabled = on;
  document.getElementById('genBtn').disabled = on;
  document.getElementById('mainGenBtn').textContent = on ? '✨ 생성 중...' : '✨ 블로그 글 생성하기';
  document.getElementById('genBtn').textContent = on ? '...' : '✨ 생성';
}

function toggleEdit() {
  isEditing = !isEditing;
  const body = document.getElementById('resultBody');
  const edit = document.getElementById('resultEdit');
  const btn = document.getElementById('editToggleBtn');
  if (isEditing) {
    edit.value = body.textContent;
    body.classList.add('hide');
    edit.classList.add('show');
    btn.textContent = '✅ 완료';
  } else {
    body.textContent = edit.value;
    body.classList.remove('hide');
    edit.classList.remove('show');
    btn.textContent = '✏️ 편집';
  }
}

function copyTitle() {
  const title = document.getElementById('resultTitle').textContent;
  navigator.clipboard.writeText(title).then(() => {
    showToast('📋 제목 복사됨!');
    const btn = document.getElementById('copyTitleBtn');
    btn.classList.add('copy-done');
    btn.textContent = '✓ 복사됨';
    setTimeout(() => { btn.classList.remove('copy-done'); btn.textContent = '제목 복사'; }, 2000);
  });
}

function copyAll() {
  const title = document.getElementById('resultTitle').textContent;
  const body = isEditing ? document.getElementById('resultEdit').value : document.getElementById('resultBody').textContent;
  const tags = Array.from(document.querySelectorAll('.result-tag')).map(t => t.textContent).join(' ');
  navigator.clipboard.writeText(`${title}\n\n${body}\n\n${tags}`).then(() => {
    showToast('📋 전체 복사됐어요! 네이버 블로그에 붙여넣기 하세요 ✨');
  });
}

function renderHistory() {
  if (!history.length) return;
  document.getElementById('historySection').style.display = 'block';
  document.getElementById('historyList').innerHTML = history.map((h, i) => `
    <div class="history-item" onclick="loadHistory(${i})">
      <div class="history-kw">${h.keyword}</div>
      <div class="history-preview">${h.title}</div>
      <div class="history-time">${h.time.getHours().toString().padStart(2,'0')}:${h.time.getMinutes().toString().padStart(2,'0')}</div>
    </div>
  `).join('');
}

function loadHistory(i) {
  const h = history[i];
  document.getElementById('resultTitle').textContent = h.title;
  document.getElementById('resultBody').textContent = h.body;
  document.getElementById('resultEdit').value = h.body;
  document.getElementById('resultCard').classList.add('show');
  document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });
  showToast('이전 기록을 불러왔어요');
}

function showToast(msg) {
  const wrap = document.getElementById('toastWrap');
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  wrap.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}
</script>
</body>
</html>
